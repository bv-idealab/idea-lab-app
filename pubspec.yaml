name: idea_lab_app
description: AICTE IDEA Lab Management System for Bharati Vidyapeeth, Pune.

# Prevent accidental publishing to pub.dev.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  qr_flutter: ^4.1.0
  google_generative_ai: ^0.4.0
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  image_picker: ^1.2.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices.
  flutter_lints: ^3.0.0

  # Package used to automatically generate App Icons for Android and iOS
  flutter_launcher_icons: ^0.13.1

# Configuration for the flutter_launcher_icons package
flutter_icons:
  android: true
  ios: true
  image_path: "assets/app_logo.png"
  min_sdk_android: 21

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # Ensures that the Material Icons font is included with your application.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/imageA.png
    - assets/imageB.png
    - assets/imageC.png
    - assets/app_logo.png
    - assets/laser_cutter.jpg
    - assets/vinyl_cutter.jpg
    - assets/3d_printer.jpg
    - assets/3d_scanner.jpg
    - assets/cnc_router.jpg
    - assets/wood_lathe.jpg
    - assets/pcb_milling.jpg
    - assets/raspberry_pi.jpg
    - assets/esp_32.jpg
    - assets/beagle_board.jpg

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic